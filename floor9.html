<style>
* { box-sizing: border-box; }
body { margin:0; padding:8px; background:#0a0e1a; font-family:'Sarabun',sans-serif; color:#fff; overflow:hidden; }
h2 { margin:0 0 4px; }
p  { margin:0 0 8px; }
.svg-wrap {
  width: 100%;
  height: calc(100dvh - 80px);
  overflow: hidden;
  border: 1px solid rgba(0,255,231,0.15);
  border-radius: 8px;
  touch-action: none;
  cursor: grab;
  position: relative;
}
.svg-wrap:active { cursor: grabbing; }
.svg-inner {
  transform-origin: 0 0;
  will-change: transform;
  display: block;
}
svg {
  display: block;
  width: 700px;
  height: auto;
}
.hint {
  position: fixed; bottom: 12px; left: 50%; transform: translateX(-50%);
  background: rgba(0,255,231,0.1); border: 1px solid rgba(0,255,231,0.3);
  border-radius: 20px; padding: 4px 14px;
  font-size: 11px; color: rgba(0,255,231,0.7);
  pointer-events: none;
}
.room{cursor:pointer;}
.room:hover rect{filter:brightness(1.3);}
.lbl{font-family:'Sarabun',sans-serif;pointer-events:none;}
.th{font-size:11px;font-weight:600;fill:#fff;}
.ts{font-size:9px;fill:rgba(255,255,255,0.6);}
h2{text-align:center;color:#00ffe7;font-size:16px;letter-spacing:2px;margin-bottom:8px;}
p{text-align:center;color:rgba(255,255,255,0.4);font-size:12px;margin:0 0 16px;}
</style>

<style>
/* ── DESTINATION PANEL ── */
#dest-banner {
  display:none; position:fixed; top:0; left:0; right:0; z-index:200;
  background:rgba(10,14,26,0.97); border-bottom:1px solid rgba(0,255,231,0.3);
  padding:10px 14px; display:flex; align-items:center; gap:10px;
}
#dest-banner.hidden { display:none!important; }
#dest-icon { font-size:22px; }
#dest-name { flex:1; font-size:14px; font-weight:700; color:#fff; }
#dest-dist { font-size:12px; color:#00ffe7; font-weight:700; }
#dest-cancel { background:none; border:1px solid rgba(255,255,255,0.2); border-radius:20px; padding:4px 12px; color:rgba(255,255,255,0.5); font-size:11px; cursor:pointer; }

/* ── AR OVERLAY ── */
#ar-nav {
  display:none; position:fixed; inset:0; z-index:100;
  background:#000;
}
#ar-nav.active { display:block; }
#cam-feed { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; }
#ar-canvas { position:absolute; inset:0; width:100%; height:100%; pointer-events:none; }
#nav-close {
  position:absolute; top:16px; right:16px; z-index:10;
  background:rgba(10,14,26,0.8); border:1px solid rgba(255,255,255,0.2);
  border-radius:50%; width:40px; height:40px; color:#fff; font-size:18px;
  cursor:pointer; display:flex; align-items:center; justify-content:center;
}
#nav-info {
  position:absolute; bottom:0; left:0; right:0;
  background:linear-gradient(to top, rgba(10,14,26,0.95), transparent);
  padding:20px 16px 30px;
  display:flex; flex-direction:column; align-items:center; gap:8px;
}
#nav-room-name { font-size:16px; font-weight:700; color:#fff; }
#nav-distance { font-size:28px; font-weight:700; color:#00ffe7; }
#nav-hint { font-size:12px; color:rgba(255,255,255,0.4); }

/* ── ROOM CLICK HIGHLIGHT ── */
.room rect { transition: filter 0.2s; }
.room.selected rect { filter: brightness(2) drop-shadow(0 0 6px #00ffe7); }

/* ── NAV BUTTON ── */
#nav-btn {
  display:none; position:fixed; bottom:80px; left:50%; transform:translateX(-50%);
  background:#00ffe7; color:#0a0e1a; border:none; border-radius:50px;
  padding:12px 32px; font-size:15px; font-weight:700; cursor:pointer; z-index:50;
  box-shadow:0 0 20px rgba(0,255,231,0.4);
}
</style>

#cal-export-btn {

<script>
const wrap = document.querySelector('.svg-wrap');
const inner = document.querySelector('.svg-inner');

let scale = 1, minScale = 0.4, maxScale = 5;
let tx = 0, ty = 0;
let startX, startY, startTx, startTy;
let isPanning = false;
let lastDist = 0, lastScale = 1;

function setTransform() {
  inner.style.transform = `translate(${tx}px, ${ty}px) scale(${scale})`;
}

// ── PINCH ZOOM ──
wrap.addEventListener('touchstart', e => {
  if (e.touches.length === 2) {
    lastDist = Math.hypot(
      e.touches[0].clientX - e.touches[1].clientX,
      e.touches[0].clientY - e.touches[1].clientY
    );
    lastScale = scale;
    isPanning = false;
  } else if (e.touches.length === 1) {
    isPanning = true;
    startX = e.touches[0].clientX - tx;
    startY = e.touches[0].clientY - ty;
  }
}, { passive: true });

wrap.addEventListener('touchmove', e => {
  e.preventDefault();
  if (e.touches.length === 2) {
    const dist = Math.hypot(
      e.touches[0].clientX - e.touches[1].clientX,
      e.touches[0].clientY - e.touches[1].clientY
    );
    scale = Math.min(maxScale, Math.max(minScale, lastScale * (dist / lastDist)));
    setTransform();
  } else if (e.touches.length === 1 && isPanning) {
    tx = e.touches[0].clientX - startX;
    ty = e.touches[0].clientY - startY;
    setTransform();
  }
}, { passive: false });

// ── MOUSE DRAG ──
wrap.addEventListener('mousedown', e => {
  isPanning = true;
  startX = e.clientX - tx;
  startY = e.clientY - ty;
});
window.addEventListener('mousemove', e => {
  if (!isPanning) return;
  tx = e.clientX - startX;
  ty = e.clientY - startY;
  setTransform();
});
window.addEventListener('mouseup', () => isPanning = false);

// ── MOUSE WHEEL ZOOM ──
wrap.addEventListener('wheel', e => {
  e.preventDefault();
  const rect = wrap.getBoundingClientRect();
  const ox = e.clientX - rect.left;
  const oy = e.clientY - rect.top;
  const delta = e.deltaY > 0 ? 0.9 : 1.1;
  const newScale = Math.min(maxScale, Math.max(minScale, scale * delta));
  tx = ox - (ox - tx) * (newScale / scale);
  ty = oy - (oy - ty) * (newScale / scale);
  scale = newScale;
  setTransform();
}, { passive: false });

// ── DOUBLE TAP RESET ──
let lastTap = 0;
wrap.addEventListener('touchend', e => {
  const now = Date.now();
  if (now - lastTap < 300) { scale=1; tx=0; ty=0; setTransform(); }
  lastTap = now;
});
</script>

<script>
// ── ROOM COORDINATES (lat, lng) ──
// ⚠️ แก้ค่าจริงให้ตรงกับตำแหน่งห้องในอาคาร

  "f9-student":    { lat: 13.7954, lng: 100.4302, name:"ห้องพักนักศึกษา",       icon:"🎓" },
  "f9-toilet-b":   { lat: 13.7955, lng: 100.4303, name:"ห้องน้ำ (B)",           icon:"🚹🚺" },
  "f9-faculty-c1": { lat: 13.7953, lng: 100.4299, name:"ห้องพักอาจารย์ C1",    icon:"👨‍🏫" },
  "f9-faculty-c2": { lat: 13.7953, lng: 100.4299, name:"ห้องพักอาจารย์ C2",    icon:"👨‍🏫" },
  "f9-staff-c":    { lat: 13.7953, lng: 100.4301, name:"ห้องเจ้าหน้าที่ (C)",  icon:"👥" },
  "f9-faculty-c3": { lat: 13.7953, lng: 100.4302, name:"ห้องพักอาจารย์ C3",    icon:"👨‍🏫" },
  "f9-faculty-c4": { lat: 13.7954, lng: 100.4303, name:"ห้องพักอาจารย์ C4",    icon:"👨‍🏫" },
  "f9-faculty-d":  { lat: 13.7952, lng: 100.4299, name:"ห้องพักอาจารย์ D",     icon:"👨‍🏫" },
  "f9-jk":         { lat: 13.7952, lng: 100.4301, name:"JK Commons",            icon:"🎤" },
  "f9-relax":      { lat: 13.7952, lng: 100.4302, name:"พื้นที่พักผ่อน",        icon:"🌿" },
  "f9-faculty-e":  { lat: 13.7951, lng: 100.4299, name:"ห้องพักอาจารย์ E",     icon:"👨‍🏫" },
  "f9-faculty-f1": { lat: 13.7950, lng: 100.4299, name:"ห้องพักอาจารย์ F1",    icon:"👨‍🏫" },
  "f9-faculty-f2": { lat: 13.7950, lng: 100.4299, name:"ห้องพักอาจารย์ F2",    icon:"👨‍🏫" },
  "f9-cowork":     { lat: 13.7950, lng: 100.4301, name:"Co-working Space 2",    icon:"🖥️" },
  "f9-toilet-f":   { lat: 13.7950, lng: 100.4302, name:"ห้องน้ำ (F)",           icon:"🚹🚺" },
};

// ── STATE ──
let destRoom = null;
let userLat = null, userLng = null;
let userHeading = 0;
let navActive = false;
let camStream = null;
let animFrame = null;

// ── GPS ──
navigator.geolocation && navigator.geolocation.watchPosition(
  pos => { userLat = pos.coords.latitude; userLng = pos.coords.longitude; updateDist(); },
  err => console.warn('GPS:', err),
  { enableHighAccuracy: true, maximumAge: 2000 }
);

// ── COMPASS ──
function startCompass() {
  if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
    DeviceOrientationEvent.requestPermission().then(s => { if(s==='granted') listenOrient(); });
  } else { listenOrient(); }
}
function listenOrient() {
  window.addEventListener('deviceorientationabsolute', onOrient, true);
  window.addEventListener('deviceorientation', onOrient, true);
}
function onOrient(e) {
  if (e.webkitCompassHeading !== undefined) userHeading = e.webkitCompassHeading;
  else if (e.alpha !== null) userHeading = (360 - e.alpha) % 360;
}
startCompass();

// ── HAVERSINE ──
function haversine(lat1,lng1,lat2,lng2) {
  const R=6371000, dLat=(lat2-lat1)*Math.PI/180, dLng=(lng2-lng1)*Math.PI/180;
  const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}
function bearingTo(lat1,lng1,lat2,lng2) {
  const dLng=(lng2-lng1)*Math.PI/180;
  const y=Math.sin(dLng)*Math.cos(lat2*Math.PI/180);
  const x=Math.cos(lat1*Math.PI/180)*Math.sin(lat2*Math.PI/180)-Math.sin(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.cos(dLng);
  return (Math.atan2(y,x)*180/Math.PI+360)%360;
}
function formatDist(m) { return m<1000?`${Math.round(m)} ม.`:`${(m/1000).toFixed(1)} กม.`; }

// ── SELECT ROOM ──
function selectRoom(id) {
  const coord = ROOM_COORDS[id];
  if (!coord) return;
  destRoom = { id, ...coord };
  // highlight
  document.querySelectorAll('.room').forEach(r => r.classList.remove('selected'));
  const el = document.querySelector(`[data-id="${id}"]`);
  if (el) el.classList.add('selected');
  // show banner
  document.getElementById('dest-name').textContent = coord.icon + ' ' + coord.name;
  document.getElementById('dest-banner').classList.remove('hidden');
  document.getElementById('nav-btn').style.display = 'block';
  updateDist();
}

function updateDist() {
  if (!destRoom || userLat === null) return;
  const d = haversine(userLat, userLng, destRoom.lat, destRoom.lng);
  document.getElementById('dest-dist').textContent = formatDist(d);
}

function cancelNav() {
  destRoom = null;
  document.getElementById('dest-banner').classList.add('hidden');
  document.getElementById('nav-btn').style.display = 'none';
  document.querySelectorAll('.room').forEach(r => r.classList.remove('selected'));
  stopAR();
}

// ── AR NAVIGATION ──
async function startAR() {
  navActive = true;
  document.getElementById('ar-nav').classList.add('active');
  try {
    camStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
    document.getElementById('cam-feed').srcObject = camStream;
  } catch(e) { console.warn('Camera:', e); }
  drawARLoop();
}

function stopAR() {
  navActive = false;
  document.getElementById('ar-nav').classList.remove('active');
  if (camStream) { camStream.getTracks().forEach(t => t.stop()); camStream = null; }
  if (animFrame) cancelAnimationFrame(animFrame);
}

function drawARLoop() {
  if (!navActive) return;
  drawAR();
  animFrame = requestAnimationFrame(drawARLoop);
}

function drawAR() {
  const canvas = document.getElementById('ar-canvas');
  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  if (!destRoom || userLat === null) return;

  const dist = haversine(userLat, userLng, destRoom.lat, destRoom.lng);
  const bearing = bearingTo(userLat, userLng, destRoom.lat, destRoom.lng);
  let relAngle = bearing - userHeading;
  while (relAngle > 180) relAngle -= 360;
  while (relAngle < -180) relAngle += 360;

  const cx = canvas.width / 2;
  const cy = canvas.height / 2;

  // วาดลูกศร
  ctx.save();
  ctx.translate(cx, cy - 60);
  ctx.rotate((relAngle * Math.PI) / 180);

  // ลูกศรหลัก
  const arrowSize = Math.min(80, canvas.width * 0.2);
  ctx.beginPath();
  ctx.moveTo(0, -arrowSize);
  ctx.lineTo(arrowSize * 0.4, arrowSize * 0.2);
  ctx.lineTo(arrowSize * 0.15, arrowSize * 0.2);
  ctx.lineTo(arrowSize * 0.15, arrowSize * 0.6);
  ctx.lineTo(-arrowSize * 0.15, arrowSize * 0.6);
  ctx.lineTo(-arrowSize * 0.15, arrowSize * 0.2);
  ctx.lineTo(-arrowSize * 0.4, arrowSize * 0.2);
  ctx.closePath();

  const grad = ctx.createLinearGradient(0, -arrowSize, 0, arrowSize);
  grad.addColorStop(0, '#00ffe7');
  grad.addColorStop(1, 'rgba(0,255,231,0.3)');
  ctx.fillStyle = grad;
  ctx.shadowColor = '#00ffe7';
  ctx.shadowBlur = 20;
  ctx.fill();
  ctx.restore();

  // วงกลม pulse
  const pulse = (Date.now() % 1500) / 1500;
  ctx.beginPath();
  ctx.arc(cx, cy - 60, 50 + pulse * 30, 0, Math.PI * 2);
  ctx.strokeStyle = `rgba(0,255,231,${0.4 - pulse * 0.4})`;
  ctx.lineWidth = 2;
  ctx.stroke();

  // ชื่อห้อง + ระยะ
  document.getElementById('nav-room-name').textContent = destRoom.icon + ' ' + destRoom.name;
  document.getElementById('nav-distance').textContent = formatDist(dist);

  // บอก GPS status
  const hint = userLat !== null ? '📍 GPS พร้อม' : '⏳ รอ GPS...';
  document.getElementById('nav-hint').textContent = hint;
}

// ── BIND ROOM CLICKS ──
window.addEventListener('DOMContentLoaded', () => {
  document.querySelectorAll('.room').forEach(room => {
    room.style.cursor = 'pointer';
    room.addEventListener('click', () => {
      const id = room.dataset.id;
      if (id) selectRoom(id);
    });
  });
});
</script>

<script>
// ── CALIBRATION ──
let calCoords = {};
let calGpsReady = false;
let calLat = null, calLng = null, calAcc = null;

// โหลดค่าที่บันทึกไว้จาก localStorage
try {
  const saved = localStorage.getItem('tmhg_f9_coords');
  if (saved) {
    calCoords = JSON.parse(saved);
    // อัปเดต ROOM_COORDS ด้วยค่าที่บันทึก
    Object.assign(ROOM_COORDS, calCoords);
    console.log('Loaded', Object.keys(calCoords).length, 'saved coords');
  }
} catch(e) {}

// GPS สำหรับ calibration
navigator.geolocation && navigator.geolocation.watchPosition(
  pos => {
    calLat = pos.coords.latitude;
    calLng = pos.coords.longitude;
    calAcc = Math.round(pos.coords.accuracy);
    calGpsReady = true;
    const dot = document.getElementById('cal-gps-dot');
    const txt = document.getElementById('cal-gps-text');
    const btn = document.getElementById('cal-save-btn');
    if (dot) { dot.className = 'cal-dot ready'; }
    if (txt) txt.textContent = `GPS พร้อม ± ${calAcc} เมตร`;
    if (btn) btn.disabled = false;
  },
  err => {
    const txt = document.getElementById('cal-gps-text');
    if (txt) txt.textContent = 'ไม่พบ GPS — ลองเปิด Location';
  },
  { enableHighAccuracy: true, maximumAge: 1000 }
);

function openCal() {
  document.getElementById('cal-panel').classList.add('open');
  renderSavedList();
}
function closeCal() {
  document.getElementById('cal-panel').classList.remove('open');
}

function saveRoomCoord() {
  const sel = document.getElementById('cal-room-select');
  const id = sel.value;
  if (!id) { alert('กรุณาเลือกห้องก่อน'); return; }
  if (!calGpsReady || calLat === null) { alert('GPS ยังไม่พร้อม'); return; }

  const roomInfo = ROOM_COORDS[id] || {};
  calCoords[id] = {
    ...roomInfo,
    lat: calLat,
    lng: calLng,
    acc: calAcc,
    ts: new Date().toLocaleTimeString('th-TH')
  };
  // อัปเดต ROOM_COORDS ทันที
  ROOM_COORDS[id] = calCoords[id];
  // บันทึก localStorage
  try { localStorage.setItem('tmhg_f9_coords', JSON.stringify(calCoords)); } catch(e) {}

  renderSavedList();
  // แสดง feedback
  sel.value = '';
  const btn = document.getElementById('cal-save-btn');
  const orig = btn.textContent;
  btn.textContent = '✅ บันทึกแล้ว!';
  setTimeout(() => btn.textContent = orig, 1500);
}

function renderSavedList() {
  const list = document.getElementById('cal-saved-list');
  if (!list) return;
  const keys = Object.keys(calCoords);
  if (keys.length === 0) {
    list.innerHTML = '<div style="padding:8px;color:rgba(255,255,255,0.3);font-size:11px;text-align:center">ยังไม่มีตำแหน่งที่บันทึก</div>';
    return;
  }
  list.innerHTML = keys.map(id => {
    const c = calCoords[id];
    return `<div class="cal-item">
      <span class="cal-room-name">${c.icon||'📍'} ${c.name||id}</span>
      <span class="cal-coords">${c.lat.toFixed(5)}, ${c.lng.toFixed(5)}</span>
    </div>`;
  }).join('');
}

function exportCoords() {
  const lines = Object.entries(calCoords).map(([id, c]) =>
    `"${id}": { lat: ${c.lat}, lng: ${c.lng} }, // ±${c.acc||'?'}m`
  ).join('\n');
  const out = `// ROOM_COORDS ชั้น 9 — บันทึก ${new Date().toLocaleDateString('th-TH')}\n${lines}`;
  navigator.clipboard.writeText(out).then(() => {
    const btn = document.getElementById('cal-export-btn');
    btn.textContent = '✅ Copy แล้ว!';
    setTimeout(() => btn.textContent = '📋 Copy ค่าพิกัดทั้งหมด', 2000);
  }).catch(() => {
    prompt('Copy ค่าด้านล่าง:', out);
  });
}
</script>
</body>
</html>
